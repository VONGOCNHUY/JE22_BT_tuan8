<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{_layout}">

<head>
<meta charset="UTF-8">
</head>

<body>

<div layout:fragment="content">

<div class="text-center mt-5">
    <div class="alert alert-success" role="alert">
        <h2>✓ Đặt hàng thành công!</h2>
        <p>Cảm ơn bạn đã mua hàng tại cửa hàng của chúng tôi.</p>
    </div>

    <div class="card mt-4" style="max-width: 500px; margin: 0 auto;">
        <div class="card-body">
            <h5 class="card-title">Thông tin đơn hàng</h5>
            <p><strong>Mã đơn hàng:</strong> <span th:text="${orderId}" class="badge bg-primary"></span></p>
            <p><strong>Tổng tiền:</strong> <span th:text="${#numbers.formatInteger(totalPrice, 0)} + ' đ'" class="text-success" style="font-size: 1.2em;"></span></p>
        </div>
    </div>

    <div class="mt-4">
        <a href="/products" class="btn btn-primary">← Tiếp tục mua sắm</a>
        <a th:href="@{/order/{id}(id=${orderId})}" class="btn btn-info">Xem chi tiết đơn hàng</a>
    </div>
</div>

</div>

</body>
</html>
