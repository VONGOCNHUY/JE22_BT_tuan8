<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lịch sử đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="_layout :: header"></div>

    <div class="container mt-4">
        <h2 class="mb-4">Lịch sử đơn hàng</h2>

        <div th:if="${orders == null or orders.size() == 0}" class="alert alert-info">
            <p>Bạn chưa có đơn hàng nào. <a href="/products">Tiếp tục mua sắm</a></p>
        </div>

        <div th:if="${orders != null and orders.size() > 0}" class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Mã đơn hàng</th>
                        <th>Ngày đặt</th>
                        <th>Số sản phẩm</th>
                        <th>Phương thức thanh toán</th>
                        <th>Tổng tiền</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="#{'Order #' + order.id}"></td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${order.orderDetails.size()}"></td>
                        <td th:text="${order.paymentMethod != null ? order.paymentMethod : 'Chưa xác định'}"></td>
                        <td th:text="${#numbers.formatInteger(order.totalPrice, 0)} + ' đ'"></td>
                        <td>
                            <a th:href="@{/order/{id}(id=${order.id})}" class="btn btn-sm btn-primary">
                                Xem chi tiết
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-3">
            <a href="/products" class="btn btn-secondary">Tiếp tục mua sắm</a>
        </div>
    </div>

    <div th:replace="_layout :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
