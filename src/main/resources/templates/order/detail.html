<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{_layout}">

<head>
<meta charset="UTF-8">
</head>

<body>

<div layout:fragment="content">

<h2 class="mb-4">📋 Chi tiết đơn hàng</h2>

<div class="row">
    <div class="col-md-8">
        <div class="card mb-4">
            <div class="card-header">
                <h5>Thông tin đơn hàng</h5>
            </div>
            <div class="card-body">
                <p><strong>Mã đơn hàng:</strong> <span th:text="${order.id}"></span></p>
                <p><strong>Tên khách hàng:</strong> <span th:text="${order.account.fullName}"></span></p>
                <p><strong>Ngày đặt:</strong> <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span></p>
                <p><strong>Phương thức thanh toán:</strong> <span th:text="${order.paymentMethod != null ? order.paymentMethod : 'Chưa xác định'}"></span></p>
                <p><strong>Tổng tiền:</strong> <span th:text="${#numbers.formatInteger(order.totalPrice, 0)} + ' đ'" class="text-success font-weight-bold"></span></p>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Chi tiết sản phẩm</h5>
            </div>
            <div class="card-body">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Tổng tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="detail : ${order.orderDetails}">
                            <td th:text="${detail.product.name}"></td>
                            <td th:text="${#numbers.formatInteger(detail.price, 0)} + ' đ'"></td>
                            <td th:text="${detail.quantity}"></td>
                            <td th:text="${#numbers.formatInteger(detail.totalPrice, 0)} + ' đ'"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h5>Hành động</h5>
            </div>
            <div class="card-body">
                <a href="/products" class="btn btn-primary w-100">← Tiếp tục mua sắm</a>
            </div>
        </div>
    </div>
</div>

</div>

</body>
</html>
