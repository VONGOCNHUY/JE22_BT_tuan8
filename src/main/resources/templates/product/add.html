<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{_layout}">

<head>
<meta charset="UTF-8">
<title>Add Product</title>
</head>

<body>

<div layout:fragment="content">

<h2>Add Product</h2>

<form th:action="@{/products/save}" th:object="${product}" method="post">

<div class="form-group">
    <label>Name</label>
    <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
</div>

<div class="form-group">
    <label>Image URL</label>
    <input type="text" th:field="*{image}" class="form-control" th:classappend="${#fields.hasErrors('image')} ? 'is-invalid'">
    <div class="invalid-feedback" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
</div>

<div class="form-group">
<label>Price</label>
<input type="number" th:field="*{price}" class="form-control">
</div>

<div class="form-group">
<label>Category</label>

<select th:field="*{category}" class="form-control">
    <option value="">-- Select Category --</option>
    <option th:each="c : ${categories}"
            th:value="${c.id}"
            th:text="${c.name}"
            th:selected="${product.category?.id == c.id}">
    </option>
</select>

</div>

<br>

<button type="submit" class="btn btn-success">Add Product</button>

</form>

</div>

</body>
</html>
