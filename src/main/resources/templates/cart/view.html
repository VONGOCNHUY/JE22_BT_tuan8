<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
layout:decorate="~{_layout}">

<head>
<meta charset="UTF-8">
</head>

<body>

<div layout:fragment="content">

<h2 class="mb-4">🛒 Giỏ hàng của bạn</h2>

<div th:if="${cartItems == null or cartItems.isEmpty()}" class="alert alert-info">
    <p>Giỏ hàng của bạn trống. <a href="/products" class="alert-link">Tiếp tục mua sắm</a></p>
</div>

<div th:if="${cartItems != null and !cartItems.isEmpty()}">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Sản phẩm</th>
                <th>Hình ảnh</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Tổng tiền</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${cartItems}">
                <td th:text="${item.productName}"></td>
                <td>
                    <img height="80" width="100" th:src="${item.image}" alt="Product">
                </td>
                <td th:text="${#numbers.formatInteger(item.price, 0)} + ' đ'"></td>
                <td>
                    <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="POST" style="display: inline;">
                        <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="100" style="width: 50px;">
                        <button type="submit" class="btn btn-sm btn-warning">Cập nhật</button>
                    </form>
                </td>
                <td th:text="${#numbers.formatInteger(item.totalPrice, 0)} + ' đ'"></td>
                <td>
                    <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn btn-sm btn-danger">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="row mt-4">
        <div class="col-md-6">
            <a href="/products" class="btn btn-secondary">Tiếp tục mua sắm</a>
            <a href="/cart/clear" class="btn btn-danger">Xóa toàn bộ</a>
        </div>
        <div class="col-md-6 text-end">
            <h4>Tổng tiền giỏ hàng: <span th:text="${#numbers.formatInteger(totalPrice, 0)} + ' đ'" class="text-success"></span></h4>
            <a href="/order/checkout" class="btn btn-primary btn-lg">Tiến hành thanh toán</a>
        </div>
    </div>
</div>

</div>

</body>
</html>
