<!DOCTYPE html>
<html lang="en"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<title>Bai 5 QLSP JPA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div style="padding-left:40px; display: flex; justify-content: space-between; width: 100%;">

<div>
<a class="navbar-brand" th:href="@{/products}">Home</a>
<a class="navbar-brand" th:href="@{/products/add}">Products</a>
<a class="navbar-brand" th:href="@{/order/list}">📋 Lịch sử đơn hàng</a>
<a class="navbar-brand" th:href="@{/cart}">🛒 Giỏ hàng <span class="badge bg-danger" th:if="${session.cart != null and session.cart.size() > 0}" th:text="${session.cart.size()}"></span></a>
</div>

<div style="color: white; margin-right: 40px;">
<span sec:authorize="isAuthenticated()">
Welcome: <strong><span sec:authentication="name"></span></strong> |
<a href="/logout" style="color: white; text-decoration: none;">Logout</a>
</span>
</div>

</div>
</nav>

<div layout:fragment="content" class="container body-content"></div>

<div class="card-footer text-center">
<hr>
<p>© 2025 - Phát triển ứng dụng với J2EE</p>
</div>

</body>
</html>
